<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free School Management Software</title>
    <link rel="stylesheet" href="{% static 'styles/style_0.css' %}">

    <link rel="stylesheet" href="{% static 'styles/features.css' %}">
    <link rel="stylesheet" href="{% static 'styles/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'styles/about.css' %}">
    <link rel="stylesheet" href="{% static 'styles/contact.css' %}">
    <link rel="stylesheet" href="{% static 'styles/learn_more.css' %}">
    <link rel="stylesheet" href="{% static 'styles/pricing.css' %}">
    <link rel="stylesheet" href="{% static 'styles/login.css' %}">
    <link rel="stylesheet" href="{% static 'styles/dashboard.css' %}">

    <link rel="stylesheet" href="{% static 'styles/teacher_form.css'%}">
    <link rel="stylesheet" href="{% static 'styles/teacher_list.css'%}">

    <link rel="stylesheet" href="{% static 'css/class_form.css' %}">
    <link rel="stylesheet" href="{% static 'css/class_all.css' %}">

    <link rel="stylesheet" href="{% static 'styles/section_form.css'%}">
    <link rel="stylesheet" href="{% static 'styles/section_all.css'%}">

    <link rel="stylesheet" href="{% static 'styles/student_form.css'%}">
    <link rel="stylesheet" href="{% static 'styles/student_all.css'%}">

    <link rel="stylesheet" href="{% static 'styles/transaction_form.css' %}">
    <link rel="stylesheet" href="{% static 'styles/transaction_all.css' %}">

    <link rel="stylesheet" href="{% static 'styles/fee_form.css' %}">
    <link rel="stylesheet" href="{% static 'styles/fee_all.css' %}">

    <link rel="stylesheet" href="{% static 'styles/salary_all.css' %}">

    <link rel="stylesheet" href="{% static 'styles/financial_reports.css' %}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="{% static 'js/teacher_list.js' %}"></script>
    <script src="{% static 'js/scripts.js' %}"></script>
</head>
<body>
    {% include 'navbar.html' %}
    

    {% if messages %}
    <div class="messages-container">

        {% for message in messages %}
        <div class="alert-message {{ message.tags }}">
            <span>{{ message }}</span>
            <button class="close-alert">&times;</button>
        </div>
        {% endfor %}
        
    </div>
    
    {% endif %}

    {% block content %}


    {% endblock %}
    
</body>

</html>
<style>

.messages-container{
    position:fixed;
    top:20px;
    right:20px;
    z-index:9999;
    width:350px;
}

.alert-message{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    margin-bottom:10px;
    border-radius:12px;
    color:white;
    font-weight:500;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    animation:slideIn .4s ease;
}

.alert-message.success{
    background:#16a34a;
}

.alert-message.error{
    background:#dc2626;
}

.alert-message.warning{
    background:#f59e0b;
}

.alert-message.info{
    background:#2563eb;
}

.close-alert{
    border:none;
    background:none;
    color:white;
    font-size:20px;
    cursor:pointer;
}

@keyframes slideIn{

    from{
        transform:translateX(100%);
        opacity:0;
    }

    to{
        transform:translateX(0);
        opacity:1;
    }

}

</style>

<script>

    document.querySelectorAll('.close-alert').forEach(btn => {

        btn.addEventListener('click', function () {this.parentElement.remove();});

    });

    setTimeout(() => {
        document.querySelectorAll('.alert-message').forEach(alert => {

            alert.style.opacity = '0';

            setTimeout(() => {alert.remove();}, 500);

        });

    }, 4000);

</script>
